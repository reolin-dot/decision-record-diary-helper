<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>决策成长日记 - 浇水/复盘页设计稿</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', sans-serif;
      background: #f5f5f5;
      color: #222222;
      font-size: 14px;
      line-height: 1.5;
      max-width: 375px;
      margin: 0 auto;
      min-height: 100vh;
      padding-bottom: 16px;
    }

    /* ====== 顶部导航 ====== */
    .nav-bar {
      background: linear-gradient(135deg, #4A7C59 0%, #3A6247 100%);
      padding: 16px;
      color: #fff;
    }

    .nav-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .nav-subtitle {
      font-size: 13px;
      opacity: 0.8;
    }

    /* ====== 今日复盘卡片 ====== */
    .today-card {
      background: #fff;
      margin: -8px 16px 16px;
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
    }

    .today-label {
      font-size: 12px;
      color: #4A7C59;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .today-decision-title {
      font-size: 16px;
      font-weight: 600;
      color: #222;
      margin-bottom: 8px;
    }

    .today-decision-desc {
      font-size: 13px;
      color: #888;
      line-height: 1.5;
      margin-bottom: 12px;
    }

    .today-actions {
      display: flex;
      gap: 8px;
    }

    .today-btn {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      text-align: center;
      border: none;
    }

    .btn-water {
      background: #e8f0e8;
      color: #4A7C59;
    }

    .btn-skip {
      background: #f5f5f5;
      color: #888;
    }

    /* ====== 待复盘列表 ====== */
    .section-title {
      font-size: 15px;
      font-weight: 600;
      padding: 16px 16px 12px;
      color: #222;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .section-count {
      font-size: 12px;
      color: #888;
      font-weight: 400;
    }

    .review-list {
      padding: 0 16px;
    }

    .review-card {
      background: #fff;
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.06);
      transition: transform 0.2s;
    }

    .review-card:active {
      transform: scale(0.98);
    }

    .review-stage-icon {
      font-size: 28px;
      flex-shrink: 0;
    }

    .review-body {
      flex: 1;
      min-width: 0;
    }

    .review-title {
      font-size: 14px;
      font-weight: 600;
      color: #222;
      display: block;
      margin-bottom: 4px;
    }

    .review-meta {
      font-size: 12px;
      color: #888;
      display: block;
    }

    .review-badge {
      background: #F5A623;
      color: #fff;
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 10px;
      white-space: nowrap;
    }

    .review-arrow {
      color: #ccc;
      font-size: 18px;
    }

    /* ====== 已完成复盘 ====== */
    .completed-section {
      opacity: 0.6;
    }

    .completed-badge {
      background: #e8e8e8;
      color: #888;
    }

    /* ====== 空状态 ====== */
    .empty-state {
      text-align: center;
      padding: 48px 32px;
    }

    .empty-icon {
      font-size: 48px;
      margin-bottom: 12px;
    }

    .empty-text {
      font-size: 14px;
      color: #888;
    }

    /* ====== 滑动操作 ====== */
    .swipe-hint {
      text-align: center;
      font-size: 11px;
      color: #b0b0b0;
      padding: 8px;
      margin-top: 8px;
    }

    /* ====== 复盘表单（弹窗） ====== */
    .review-modal {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: flex-end;
      z-index: 1000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }

    .review-modal.show {
      opacity: 1;
      pointer-events: auto;
    }

    .modal-content {
      background: #fff;
      width: 100%;
      max-width: 375px;
      margin: 0 auto;
      border-radius: 16px 16px 0 0;
      padding: 24px 16px 32px;
      max-height: 80vh;
      overflow-y: auto;
    }

    .modal-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 16px;
      text-align: center;
    }

    .modal-question {
      font-size: 14px;
      font-weight: 600;
      color: #222;
      margin-bottom: 12px;
    }

    .modal-textarea {
      width: 100%;
      padding: 12px;
      border: 1.5px solid #d0d0d0;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      min-height: 100px;
      resize: vertical;
      margin-bottom: 16px;
    }

    .modal-actions {
      display: flex;
      gap: 12px;
    }

    .modal-btn {
      flex: 1;
      padding: 14px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      border: none;
    }

    .modal-btn-cancel {
      background: #f5f5f5;
      color: #222;
    }

    .modal-btn-submit {
      background: #4A7C59;
      color: #fff;
    }
  </style>
</head>
<body>
  <!-- 顶部导航 -->
  <div class="nav-bar">
    <div class="nav-title">💧 浇水时间</div>
    <div class="nav-subtitle">给你的决策浇浇水，看看它们长得怎么样</div>
  </div>

  <!-- 今日复盘卡片 -->
  <div class="today-card">
    <div class="today-label">今日推荐复盘</div>
    <div class="today-decision-title">是否接受新工作的offer</div>
    <div class="today-decision-desc">你已经 3 天没有回顾这个决策了，今天有什么新的想法或进展吗？</div>
    <div class="today-actions">
      <button class="today-btn btn-water">💧 浇水复盘</button>
      <button class="today-btn btn-skip">明天再说</button>
    </div>
  </div>

  <!-- 待复盘列表 -->
  <div class="section-title">
    等待复盘
    <span class="section-count">2 个决策</span>
  </div>

  <div class="review-list">
    <div class="review-card">
      <span class="review-stage-icon">🌿</span>
      <div class="review-body">
        <span class="review-title">是否接受新工作的offer</span>
        <span class="review-meta">正在生长 · 3 天未复盘</span>
      </div>
      <span class="review-badge">待复盘</span>
      <span class="review-arrow">›</span>
    </div>

    <div class="review-card">
      <span class="review-stage-icon">🌱</span>
      <div class="review-body">
        <span class="review-title">买哪款理财产品</span>
        <span class="review-meta">种子阶段 · 1 周未复盘</span>
      </div>
      <span class="review-badge">待复盘</span>
      <span class="review-arrow">›</span>
    </div>
  </div>

  <!-- 最近已完成 -->
  <div class="section-title completed-section">
    最近已完成
    <span class="section-count">1 个决策</span>
  </div>

  <div class="review-list">
    <div class="review-card">
      <span class="review-stage-icon">🌸</span>
      <div class="review-body">
        <span class="review-title">去年换工作的决定</span>
        <span class="review-meta">已经盛开 · 上周已完成结果复盘</span>
      </div>
      <span class="review-badge completed-badge">已完成</span>
      <span class="review-arrow">›</span>
    </div>
  </div>

  <div class="swipe-hint">← 左右滑动可执行更多操作 →</div>

  <script>
    // 点击复盘卡片
    document.querySelectorAll('.review-card').forEach(card => {
      card.addEventListener('click', function() {
        console.log('打开复盘表单');
      });
    });

    // 浇水按钮
    document.querySelector('.btn-water').addEventListener('click', function() {
      console.log('开始复盘');
    });
  </script>
</body>
</html>
